<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library Management - Login</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 380px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }


        .logo {
            text-align: center;
            font-size: 45px;
            margin-bottom: 10px;
        }


        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }


        .subtitle {
            text-align: center;
            color: gray;
            font-size: 14px;
            margin-bottom: 25px;
        }


        .input-box {
            margin-bottom: 18px;
        }


        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
        }


        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }


        input:focus {
            border-color: #667eea;
        }


        .password-box {
            position: relative;
        }


        .show-btn {
            position: absolute;
            right: 10px;
            top: 12px;
            border: none;
            background: none;
            cursor: pointer;
            color: #667eea;
        }


        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }


        button:hover {
            background: #5563c1;
        }


        .register {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }


        .register a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }


    </style>

</head>


<body>


<div class="login-container">


    <div class="logo">
        📚
    </div>


    <h2>Library Login</h2>

    <p class="subtitle">
        Login to access your account
    </p>



    <form id="loginForm">


        <div class="input-box">

            <label>Email</label>

            <input 
            type="email"
            id="email"
            placeholder="Enter your email"
            required>

        </div>



        <div class="input-box">

            <label>Password</label>

            <div class="password-box">

                <input 
                type="password"
                id="password"
                placeholder="Enter your password"
                required>


                <button 
                type="button"
                class="show-btn"
                onclick="showPassword()">
                Show
                </button>

            </div>

        </div>



        <button type="submit">
            Login
        </button>


    </form>



    <div class="register">

        Don't have an account?

        <a href="register.html">
            Register
        </a>

    </div>


</div>



<script>

function showPassword(){

    let password = document.getElementById("password");

    if(password.type === "password"){
        password.type = "text";
    }
    else{
        password.type = "password";
    }

}

</script>


<script src="../js/login.js"></script>


</body>

</html>
