<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Add Member</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<link rel="stylesheet" href="../css/dashboard.css">


</head>


<body>


<div class="wrapper">


<!-- Sidebar -->

<aside class="sidebar">


<div class="logo">

<i class="bi bi-book-half"></i>

<span>Library</span>

</div>


<ul>


<li>

<a href="dashboard.html">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

</li>


<li>

<a href="books.html">

<i class="bi bi-book"></i>

</a>

</li>


<li class="active">

<a href="members.html">

<i class="bi bi-people"></i>

Members

</a>

</li>


</ul>


</aside>





<!-- Main -->


<main class="main">


<div class="topbar">


<h2>Add New Member</h2>


<a href="members.html" class="btn btn-secondary">

Back

</a>


</div>





<div class="table-container mt-4">


<form id="memberForm">


<div class="mb-3">

<label class="form-label">
Name
</label>


<input

type="text"

id="name"

class="form-control"

required>

</div>




<div class="mb-3">

<label class="form-label">
Email
</label>


<input

type="email"

id="email"

class="form-control"

required>

</div>




<div class="mb-3">

<label class="form-label">
Phone
</label>


<input

type="text"

id="phone"

class="form-control"

required>

</div>





<div class="mb-3">

<label class="form-label">
Address
</label>


<textarea

id="address"

class="form-control">

</textarea>


</div>




<button

type="submit"

class="btn btn-success">

Add Member

</button>



</form>



</div>



</main>


</div>





<script src="../js/add-member.js"></script>


</body>
