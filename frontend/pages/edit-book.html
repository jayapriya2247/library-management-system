<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="../css/books.css">

</head>

<body>

<div class="wrapper">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

<i class="bi bi-book-half"></i>

<span>Library</span>

</div>

<ul>

<li>

<a href="dashboard.html">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

</li>

<li class="active">

<a href="books.html">

<i class="bi bi-book"></i>

Books

</a>

</li>

<li>

<a href="members.html">

<i class="bi bi-people"></i>

Members

</a>

</li>

<li>

<a href="issue-book.html">

<i class="bi bi-journal-arrow-up"></i>

Issue Book

</a>

</li>

<li>

<a href="return-book.html">

<i class="bi bi-journal-arrow-down"></i>

Return Book

</a>

</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<div class="topbar">

<h2>Edit Book</h2>

<a href="books.html" class="btn btn-secondary">

Back

</a>

</div>

<div class="table-container mt-4">

<form id="editBookForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Book Title</label>

<input
type="text"
id="title"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Author</label>

<input
type="text"
id="author"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>ISBN</label>

<input
type="text"
id="isbn"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Category</label>

<select
id="category"
class="form-select">

<option>Programming</option>

<option>Database</option>

<option>Networking</option>

<option>AI & ML</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Publisher</label>

<input
type="text"
id="publisher"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Year</label>

<input
type="number"
id="year"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Price</label>

<input
type="number"
id="price"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Quantity</label>

<input
type="number"
id="quantity"
class="form-control">

</div>

<div class="col-12 mb-3">

<label>Description</label>

<textarea
id="description"
rows="4"
class="form-control"></textarea>

</div>

</div>

<button
type="submit"
class="btn btn-success">

Update Book

</button>

</form>

</div>

</main>

</div>

<script src="../js/edit-book.js"></script>

</body>

</html>
